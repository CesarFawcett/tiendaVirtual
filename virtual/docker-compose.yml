services:
  db:
    image: postgres:15-alpine
    container_name: tienda-db
    environment:
      POSTGRES_DB: tienda_virtual
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d tienda_virtual" ]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: tienda-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tienda-app
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:postgresql://db:5432/tienda_virtual
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    ports:
      - "8080:8080"

volumes:
  postgres_data:
